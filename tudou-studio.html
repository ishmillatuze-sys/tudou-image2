<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>土豆 Image-2</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      /* 艺术工作室调色板 */
      --cream: #FAF8F5;
      --cream-dark: #F5F1EB;
      --paper: #FFFEF9;
      --charcoal: #2C2825;
      --charcoal-light: #4A4540;
      --charcoal-muted: #8A8580;
      --amber: #D4A574;
      --amber-light: #E8C9A8;
      --amber-glow: rgba(212, 165, 116, 0.3);
      --sage: #9CAF88;
      --terracotta: #C4856A;

      /* 毛玻璃效果 */
      --glass-bg: rgba(255, 254, 249, 0.72);
      --glass-border: rgba(255, 255, 255, 0.6);
      --glass-shadow: 0 8px 32px rgba(44, 40, 37, 0.08), 0 2px 8px rgba(44, 40, 37, 0.04);
      --glass-shadow-hover: 0 12px 48px rgba(44, 40, 37, 0.12), 0 4px 12px rgba(44, 40, 37, 0.06);

      /* 状态色 */
      --success: #7A9E7E;
      --warning: #D4A574;
      --error: #C4856A;

      /* 间距系统 */
      --space-xs: 4px;
      --space-sm: 8px;
      --space-md: 16px;
      --space-lg: 24px;
      --space-xl: 32px;
      --space-2xl: 48px;

      /* 圆角 */
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 24px;

      /* 过渡 */
      --transition-fast: 0.15s cubic-bezier(0.4, 0, 0.2, 1);
      --transition-smooth: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --transition-slow: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--cream);
      color: var(--charcoal);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* 纸张纹理背景 */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      opacity: 0.03;
      pointer-events: none;
      z-index: 0;
    }

    /* 主布局 */
    .app {
      height: 100vh;
      display: grid;
      grid-template-columns: 72px 1fr 320px;
      gap: 0;
      position: relative;
      z-index: 1;
    }

    /* ========== 左侧工具栏 ========== */
    .toolbar {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-right: 1px solid var(--glass-border);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: var(--space-lg) var(--space-sm);
      gap: var(--space-md);
      box-shadow: var(--glass-shadow);
    }

    .toolbar-logo {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--amber), var(--terracotta));
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      margin-bottom: var(--space-md);
      box-shadow: 0 4px 12px var(--amber-glow);
      position: relative;
      overflow: hidden;
    }

    .toolbar-logo::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.3) 50%, transparent 60%);
      animation: shimmer 3s infinite;
    }

    @keyframes shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    .toolbar-divider {
      width: 32px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--charcoal-muted), transparent);
      opacity: 0.3;
      margin: var(--space-sm) 0;
    }

    .toolbar-btn {
      width: 48px;
      height: 48px;
      border: none;
      background: transparent;
      border-radius: var(--radius-md);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--charcoal-light);
      transition: all var(--transition-fast);
      position: relative;
    }

    .toolbar-btn:hover {
      background: rgba(212, 165, 116, 0.1);
      color: var(--charcoal);
    }

    .toolbar-btn.active {
      background: var(--amber-light);
      color: var(--charcoal);
    }

    .toolbar-btn svg {
      width: 22px;
      height: 22px;
      stroke-width: 1.5;
    }

    .toolbar-btn .tooltip {
      position: absolute;
      left: calc(100% + 12px);
      background: var(--charcoal);
      color: var(--paper);
      padding: var(--space-sm) var(--space-md);
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--transition-fast);
      box-shadow: var(--glass-shadow);
    }

    .toolbar-btn:hover .tooltip {
      opacity: 1;
    }

    .toolbar-spacer {
      flex: 1;
    }

    /* ========== 中央画布区 ========== */
    .canvas-area {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* 顶部栏 */
    .top-bar {
      height: 64px;
      padding: 0 var(--space-xl);
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(44, 40, 37, 0.06);
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      flex-shrink: 0;
    }

    .top-bar-left {
      display: flex;
      align-items: center;
      gap: var(--space-lg);
    }

    .brand {
      display: flex;
      align-items: baseline;
      gap: var(--space-sm);
    }

    .brand-name {
      font-size: 22px;
      font-weight: 600;
      color: var(--charcoal);
      letter-spacing: -0.02em;
    }

    .brand-tag {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--amber);
      background: var(--amber-light);
      padding: 3px 8px;
      border-radius: 4px;
    }

    .top-bar-actions {
      display: flex;
      gap: var(--space-sm);
    }

    .action-btn {
      padding: var(--space-sm) var(--space-md);
      border: 1px solid rgba(44, 40, 37, 0.12);
      background: var(--paper);
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      color: var(--charcoal-light);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      transition: all var(--transition-fast);
      font-family: inherit;
    }

    .action-btn:hover {
      background: var(--cream-dark);
      border-color: rgba(44, 40, 37, 0.2);
      color: var(--charcoal);
    }

    .action-btn svg {
      width: 16px;
      height: 16px;
      stroke-width: 2;
    }

    /* 主内容区 */
    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: var(--space-2xl);
      display: flex;
      flex-direction: column;
      gap: var(--space-xl);
    }

    .main-content::-webkit-scrollbar {
      width: 8px;
    }

    .main-content::-webkit-scrollbar-track {
      background: transparent;
    }

    .main-content::-webkit-scrollbar-thumb {
      background: var(--charcoal-muted);
      border-radius: 4px;
      opacity: 0.3;
    }

    /* 欢迎界面 */
    .welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: var(--space-2xl);
      animation: fadeInUp 0.6s ease-out;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .welcome-icon {
      width: 120px;
      height: 120px;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-xl);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: var(--space-xl);
      box-shadow: var(--glass-shadow);
      position: relative;
    }

    .welcome-icon::before {
      content: '';
      position: absolute;
      inset: -2px;
      background: linear-gradient(135deg, var(--amber), var(--sage), var(--terracotta));
      border-radius: inherit;
      z-index: -1;
      opacity: 0.3;
      filter: blur(20px);
    }

    .welcome-icon svg {
      width: 56px;
      height: 56px;
      color: var(--amber);
    }

    .welcome-title {
      font-size: 42px;
      font-weight: 600;
      color: var(--charcoal);
      margin-bottom: var(--space-md);
      letter-spacing: -0.02em;
    }

    .welcome-desc {
      font-size: 17px;
      color: var(--charcoal-muted);
      max-width: 480px;
      margin-bottom: var(--space-2xl);
      line-height: 1.7;
    }

    .welcome-features {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--space-md);
      max-width: 600px;
    }

    .feature-card {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      padding: var(--space-lg);
      text-align: left;
      transition: all var(--transition-smooth);
      cursor: pointer;
    }

    .feature-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--glass-shadow-hover);
      border-color: var(--amber-light);
    }

    .feature-icon {
      width: 40px;
      height: 40px;
      background: var(--amber-light);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: var(--space-md);
    }

    .feature-icon svg {
      width: 20px;
      height: 20px;
      color: var(--amber);
    }

    .feature-title {
      font-weight: 600;
      color: var(--charcoal);
      margin-bottom: var(--space-xs);
      font-size: 15px;
    }

    .feature-desc {
      font-size: 13px;
      color: var(--charcoal-muted);
      line-height: 1.5;
    }

    /* 消息列表 */
    .messages {
      display: flex;
      flex-direction: column;
      gap: var(--space-xl);
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
    }

    .message {
      display: flex;
      gap: var(--space-md);
      animation: messageIn 0.4s ease-out;
    }

    @keyframes messageIn {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .message.user .message-avatar {
      background: linear-gradient(135deg, var(--amber), var(--terracotta));
      box-shadow: 0 4px 12px var(--amber-glow);
    }

    .message.assistant .message-avatar {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
    }

    .message-body {
      flex: 1;
      min-width: 0;
    }

    .message-content {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      padding: var(--space-lg);
      font-size: 15px;
      line-height: 1.7;
      color: var(--charcoal);
      box-shadow: var(--glass-shadow);
    }

    .message.user .message-content {
      background: linear-gradient(135deg, var(--amber-light), rgba(212, 165, 116, 0.15));
      border-color: var(--amber-light);
    }

    .message-meta {
      display: flex;
      align-items: center;
      gap: var(--space-md);
      margin-top: var(--space-sm);
      padding-left: var(--space-xs);
    }

    .message-time {
      font-size: 12px;
      color: var(--charcoal-muted);
    }

    .message-action {
      font-size: 12px;
      color: var(--charcoal-muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: var(--space-xs) var(--space-sm);
      border-radius: var(--radius-sm);
      transition: all var(--transition-fast);
      font-family: inherit;
      display: flex;
      align-items: center;
      gap: var(--space-xs);
    }

    .message-action:hover {
      background: rgba(44, 40, 37, 0.06);
      color: var(--charcoal);
    }

    .message-action svg {
      width: 14px;
      height: 14px;
    }

    /* 参考图网格 */
    .ref-images {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-sm);
      margin-top: var(--space-md);
    }

    .ref-image {
      width: 80px;
      height: 80px;
      border-radius: var(--radius-sm);
      overflow: hidden;
      position: relative;
      border: 2px solid var(--glass-border);
      transition: all var(--transition-fast);
    }

    .ref-image:hover {
      transform: scale(1.05);
      border-color: var(--amber);
    }

    .ref-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .ref-image-label {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: var(--space-xs);
      background: linear-gradient(transparent, rgba(44, 40, 37, 0.8));
      font-size: 10px;
      color: var(--paper);
      text-align: center;
      font-weight: 500;
    }

    /* 生成结果网格 */
    .gen-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: var(--space-md);
      margin-top: var(--space-md);
    }

    .gen-card {
      aspect-ratio: 1;
      border-radius: var(--radius-md);
      overflow: hidden;
      cursor: pointer;
      position: relative;
      background: var(--cream-dark);
      border: 1px solid var(--glass-border);
      transition: all var(--transition-smooth);
    }

    .gen-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--glass-shadow-hover);
    }

    .gen-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* 下载按钮 - 始终显示在右下角 */
    .gen-card-download {
      position: absolute;
      bottom: var(--space-sm);
      right: var(--space-sm);
      width: 32px;
      height: 32px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(8px);
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--charcoal);
      transition: all var(--transition-fast);
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .gen-card-download:hover {
      background: var(--paper);
      transform: scale(1.1);
    }

    .gen-card-download svg {
      width: 16px;
      height: 16px;
    }

    .gen-card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(transparent 60%, rgba(44, 40, 37, 0.6));
      opacity: 0;
      transition: opacity var(--transition-fast);
      display: flex;
      align-items: flex-end;
      padding: var(--space-md);
      pointer-events: none;
    }

    .gen-card:hover .gen-card-overlay {
      opacity: 1;
    }

    .gen-card-actions {
      display: flex;
      gap: var(--space-sm);
    }

    .gen-card-btn {
      width: 36px;
      height: 36px;
      background: var(--paper);
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--charcoal);
      transition: all var(--transition-fast);
    }

    .gen-card-btn:hover {
      background: var(--amber-light);
    }

    .gen-card-btn svg {
      width: 18px;
      height: 18px;
    }

    /* 生成中状态 - 空白图片 + 进度条 */
    .generating-card {
      aspect-ratio: 1;
      border-radius: var(--radius-md);
      overflow: hidden;
      position: relative;
      background: linear-gradient(135deg, var(--cream-dark), var(--cream));
      border: 1px solid var(--glass-border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--space-md);
    }

    .generating-card-icon {
      width: 48px;
      height: 48px;
      background: var(--amber-light);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.1); opacity: 1; }
    }

    .generating-card-icon svg {
      width: 24px;
      height: 24px;
      color: var(--amber);
    }

    .generating-progress {
      width: 80%;
      height: 4px;
      background: var(--glass-border);
      border-radius: 2px;
      overflow: hidden;
    }

    .generating-progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--amber), var(--terracotta));
      border-radius: 2px;
      animation: progress 3s ease-in-out infinite;
    }

    @keyframes progress {
      0% { width: 0%; }
      50% { width: 70%; }
      100% { width: 100%; }
    }

    .generating-text {
      font-size: 13px;
      color: var(--charcoal-muted);
    }

    /* 加载状态 */
    .loading {
      display: flex;
      align-items: center;
      gap: var(--space-md);
      padding: var(--space-lg);
      color: var(--charcoal-muted);
    }

    .loading-dots {
      display: flex;
      gap: var(--space-xs);
    }

    .loading-dot {
      width: 8px;
      height: 8px;
      background: var(--amber);
      border-radius: 50%;
      animation: loadingPulse 1.4s ease-in-out infinite;
    }

    .loading-dot:nth-child(2) { animation-delay: 0.2s; }
    .loading-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes loadingPulse {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1); }
    }

    /* 错误提示 */
    .error-box {
      background: rgba(196, 133, 106, 0.1);
      border: 1px solid var(--terracotta);
      border-radius: var(--radius-md);
      padding: var(--space-md);
      color: var(--terracotta);
      font-size: 14px;
      margin-top: var(--space-md);
      display: flex;
      align-items: center;
      gap: var(--space-sm);
    }

    /* ========== 输入区域 - 紧凑版 ========== */
    .input-area {
      padding: var(--space-md) var(--space-xl) var(--space-lg);
      background: linear-gradient(to top, var(--cream) 80%, transparent);
      flex-shrink: 0;
    }

    .input-container {
      max-width: 900px;
      margin: 0 auto;
    }

    /* 状态栏 */
    .status-bar {
      margin-bottom: var(--space-sm);
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: var(--space-xs);
      padding: 6px var(--space-sm);
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      font-size: 12px;
      margin-bottom: var(--space-xs);
    }

    .status-item.warning {
      background: rgba(212, 165, 116, 0.1);
      border-color: var(--amber-light);
      color: var(--amber);
    }

    .status-item.success {
      background: rgba(122, 158, 126, 0.1);
      border-color: var(--sage);
      color: var(--sage);
    }

    .status-item img {
      width: 24px;
      height: 24px;
      border-radius: var(--radius-sm);
      object-fit: cover;
    }

    .status-item .close-btn {
      margin-left: auto;
      background: none;
      border: none;
      color: inherit;
      cursor: pointer;
      padding: var(--space-xs);
      opacity: 0.6;
      transition: opacity var(--transition-fast);
    }

    .status-item .close-btn:hover {
      opacity: 1;
    }

    /* 图片选择器 - 紧凑版 */
    .image-selector {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      padding: var(--space-sm);
      margin-bottom: var(--space-sm);
    }

    .selector-header {
      font-size: 11px;
      font-weight: 600;
      color: var(--charcoal-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: var(--space-xs);
    }

    .selector-grid {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-xs);
    }

    .selector-item {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-sm);
      overflow: hidden;
      cursor: pointer;
      border: 2px solid transparent;
      position: relative;
      transition: all var(--transition-fast);
    }

    .selector-item:hover {
      border-color: var(--charcoal-muted);
    }

    .selector-item.active {
      border-color: var(--sage);

    async function compressImage(dataUrl, maxSize = MAX_IMAGE_SIZE) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          let w = img.width, h = img.height;
          if (w > maxSize || h > maxSize) {
            const ratio = Math.min(maxSize / w, maxSize / h);
            w = Math.floor(w * ratio);
            h = Math.floor(h * ratio);
          }
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, w, h);
          let q = 0.8, result = canvas.toDataURL('image/jpeg', q);
          while (result.length > MAX_FILE_SIZE * 1.37 && q > 0.1) {
            q -= 0.1;
            result = canvas.toDataURL('image/jpeg', q);
          }
          resolve(result);
        };
        img.src = dataUrl;
      });
    }

    function parseInput(input) {
      const r = { useLast: false, indices: [], labels: [], clean: input };

      if (LAST_IMAGE_KEYWORDS.some(k => input.includes(k)) && lastGeneratedImages.length) {
        r.useLast = true;
        LAST_IMAGE_KEYWORDS.forEach(k => r.clean = r.clean.replace(k, '【参考图】'));
      }

      const m = input.match(/第\s*([一二三四五六七八九十1-9])\s*张(?:图|图片)?/g);
      if (m) {
        m.forEach(txt => {
          const num = CHINESE_NUMBERS[txt.match(/[一二三四五六七八九十1-9]/)[0]];
          if (num && num <= uploadedImages.length) {
            r.indices.push(num - 1);
            r.clean = r.clean.replace(txt, `【第${num}张图】`);
          }
        });
      }

      uploadedImages.forEach((img, idx) => {
        if (img.label) {
          const patterns = [`【${img.label}】`, `把${img.label}`, `${img.label}这张`];
          patterns.forEach(p => {
            if (input.includes(p)) {
              if (!r.indices.includes(idx)) r.indices.push(idx);
              r.labels.push(img.label);
              r.clean = r.clean.replace(new RegExp(p.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'g'), `【${img.label}】`);
            }
          });
        }
      });

      r.indices = [...new Set(r.indices)].sort((a, b) => a - b);
      return r;
    }

    async function generateImg(prompt, images = []) {
      console.log('generateImg called, prompt:', prompt, 'images:', images.length);

      const size = document.getElementById('sizeSelect').value;
      const res = document.getElementById('resolutionSelect').value;

      const body = { model: 'gpt-image-2', prompt: prompt || '生成图片', size, resolution: res, n: 1 };
      if (images.length) body.image_urls = images.map(i => i.dataUrl);

      const bodyStr = JSON.stringify(body);
      console.log('Request body size:', (bodyStr.length / 1024).toFixed(2), 'KB');

      console.log('Sending request to API...');

      try {
        const resp = await fetch(`${API_URL}/images/generations`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
          body: bodyStr
        });

        console.log('Response status:', resp.status);

        const data = await resp.json();
        console.log('API response:', data);

        if (data.code !== 200) {
          throw new Error(data.message || `提交失败 (${data.code})`);
        }

        const taskId = data.data[0].task_id;
        console.log('Task ID:', taskId);

        let tries = 0;

        // 渐进式轮询：前期快（1秒），后期慢（2秒）
        while (tries < 120) {
          const interval = tries < 10 ? 1000 : 2000; // 前10次1秒，之后2秒
          await new Promise(r => setTimeout(r, interval));
          const st = await fetch(`${API_URL}/tasks/${taskId}`, { headers: { 'Authorization': `Bearer ${API_KEY}` } });
          const sd = await st.json();
          console.log('Task status:', sd.data?.status, 'tries:', tries);

          if (sd.data?.status === 'completed' || sd.data?.status === 'succeeded') {
            return { images: sd.data.result.images.map(i => Array.isArray(i.url) ? i.url[0] : i.url) };
          }
          if (sd.data?.status === 'failed') throw new Error('生成失败');

          tries++;
        }

        throw new Error('生成超时');
      } catch (err) {
        console.error('generateImg error:', err);
        throw err;
      }
    }

    async function handleFiles(files) {
      const rem = 16 - uploadedImages.length;
      document.getElementById('compressingBar').classList.remove('hidden');

      for (let i = 0; i < Math.min(files.length, rem); i++) {
        const f = files[i];
        if (!f.type.startsWith('image/')) continue;

        const reader = new FileReader();
        const dataUrl = await new Promise((res, rej) => {
          reader.onload = () => res(reader.result);
          reader.onerror = rej;
          reader.readAsDataURL(f);
        });

        const compressed = await compressImage(dataUrl);
        uploadedImages.push({
          dataUrl: compressed,
          label: f.name.replace(/\.[^/.]+$/, '').slice(0, 10) || `图${uploadedImages.length + 1}`
        });
      }

      document.getElementById('compressingBar').classList.add('hidden');
      renderPreviews();
      updateDropZone();
      onInputChange();
    }

    function renderPreviews() {
      const list = document.getElementById('previewList');
      list.innerHTML = '';

      uploadedImages.forEach((img, i) => {
        const div = document.createElement('div');
        div.className = 'preview-item';
        div.innerHTML = `
          <span class="tag">图${i+1}</span>
          <img src="${img.dataUrl}" alt="预览${i+1}">
          <button class="delete-btn" onclick="event.stopPropagation(); removeImg(${i});">✕</button>
          <input type="text" class="label-input" value="${img.label}" placeholder="标签"
            onclick="event.stopPropagation()"
            onchange="updateLabel(${i}, this.value)">
        `;
        list.appendChild(div);
      });

      updateSelector();
    }

    window.removeImg = function(i) {
      uploadedImages.splice(i, 1);
      renderPreviews();
      updateDropZone();
      onInputChange();
    };

    window.updateLabel = function(i, v) {
      uploadedImages[i].label = v || `图${i+1}`;
      updateSelector();
    };

    function clearUploads() {
      uploadedImages = [];
      renderPreviews();
      updateDropZone();
      document.getElementById('imageSelector').classList.add('hidden');
    }

    function updateDropZone() {
      const dz = document.getElementById('dropZone');
      dz.classList.toggle('has-files', uploadedImages.length > 0);
    }

    function switchTool(tool) {
      document.querySelectorAll('.toolbar-btn').forEach(btn => btn.classList.remove('active'));
      event.currentTarget.classList.add('active');
      // 工具切换逻辑
    }

    function openSettings() {
      if (confirm('确定退出登录吗？')) {
        logout();
      }
    }

    // 初始化
    checkLoginStatus();
  </script>
</body>
</html>
